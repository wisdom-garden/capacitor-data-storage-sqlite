name: Pack and Upload to OSS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Pack
        run: npm pack

      - name: Get pack filename
        id: pack
        run: |
          NAME=$(node -e "const p=require('./package.json'); console.log(p.name+'-'+p.version+'.tgz')")
          echo "file=$NAME" >> $GITHUB_OUTPUT
          echo "remote=${{ vars.OSS_REMOTE_DIR }}/$NAME" >> $GITHUB_OUTPUT

      - name: Install ali-oss
        run: npm install --no-save --legacy-peer-deps ali-oss

      - name: Upload to OSS
        run: node scripts/oss-upload.js ${{ steps.pack.outputs.file }} ${{ steps.pack.outputs.remote }}
        env:
          OSS_REGION: ${{ vars.OSS_REGION }}
          OSS_BUCKET: ${{ vars.OSS_BUCKET }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
